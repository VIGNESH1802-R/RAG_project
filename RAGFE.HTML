<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>RAG PDF Chatbot</title>

  <!-- PDF.js CSS -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      height:100vh;
      background:#f4fdf7;
      overflow:hidden;
    }

    .container{
      width:100%;
      height:100vh;
      display:flex;
      gap:20px;
      padding:20px;
    }

    /* =========================
       PDF SECTION
    ========================== */

    .pdf-section{
      flex:2;
      background:white;
      border:3px solid #22c55e;
      border-radius:25px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(34,197,94,0.2);
    }

    .pdf-header{
      padding:18px;
      background:#22c55e;
      color:white;
      text-align:center;
      font-size:24px;
      font-weight:700;
    }

    .pdf-viewer{
      flex:1;
      overflow:auto;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      background:#f0fdf4;
      padding:20px;
    }

    .pdf-pages{
      width:100%;
      display:flex;
      justify-content:center;
    }

    .pdf-container{
      position:relative;
    }

    #pdf-canvas{
      display:block;
      background:white;
      border-radius:10px;
      box-shadow:0 0 20px rgba(0,0,0,0.1);
      max-width:100%;
      height:auto;
    }

    /* =========================
       TEXT LAYER
    ========================== */

    .textLayer{
      position:absolute;
      left:0;
      top:0;
      right:0;
      bottom:0;
      overflow:hidden;
      line-height:1.0;
    }

    .textLayer span{
      position:absolute;
      white-space:pre;
      cursor:text;
      color:transparent;
      transform-origin:0% 0%;
    }

    .textLayer ::selection{
      background:rgba(34,197,94,0.4);
    }

    canvas{
      user-select:none;
    }

    /* =========================
       PDF BUTTONS
    ========================== */

    .pdf-controls{
      display:flex;
      justify-content:center;
      gap:20px;
      padding:15px;
      border-top:2px solid #dcfce7;
      background:white;
    }

    .pdf-controls button{
      padding:12px 30px;
      border:none;
      border-radius:15px;
      background:#22c55e;
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
    }

    .pdf-controls button:hover{
      background:#16a34a;
      transform:scale(1.05);
    }

    /* =========================
       CHAT SECTION
    ========================== */

    .chat-section{
      width:400px;
      background:white;
      border:3px solid #22c55e;
      border-radius:25px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 10px 30px rgba(34,197,94,0.2);
    }

    .chat-header{
      padding:20px;
      background:#22c55e;
      color:white;
      text-align:center;
      font-size:24px;
      font-weight:700;
    }

    .chat-box{
      flex:1;
      padding:20px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:15px;
      background:#f0fdf4;
    }

    .message{
      max-width:85%;
      padding:14px 18px;
      border-radius:18px;
      line-height:1.6;
      font-size:15px;
      animation:fadeIn 0.3s ease;
    }

    .user{
      align-self:flex-end;
      background:#22c55e;
      color:white;
      border-bottom-right-radius:5px;
    }

    .bot{
      align-self:flex-start;
      background:white;
      border:2px solid #22c55e;
      color:#166534;
      border-bottom-left-radius:5px;
    }

    /* =========================
       INPUT AREA
    ========================== */

    .input-area{
      display:flex;
      gap:10px;
      padding:15px;
      border-top:2px solid #dcfce7;
      background:white;
    }

    .input-area input{
      flex:1;
      padding:15px;
      border:2px solid #22c55e;
      border-radius:15px;
      outline:none;
      font-size:15px;
    }

    .input-area input:focus{
      box-shadow:0 0 10px rgba(34,197,94,0.3);
    }

    .input-area button{
      width:60px;
      border:none;
      border-radius:15px;
      background:#22c55e;
      color:white;
      font-size:20px;
      cursor:pointer;
      transition:0.3s;
    }

    .input-area button:hover{
      background:#16a34a;
      transform:scale(1.05);
    }

    /* =========================
       SCROLLBAR
    ========================== */

    ::-webkit-scrollbar{
      width:6px;
    }

    ::-webkit-scrollbar-thumb{
      background:#22c55e;
      border-radius:20px;
    }

    /* =========================
       ANIMATION
    ========================== */

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(10px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    /* =========================
       MOBILE RESPONSIVE
    ========================== */

    @media(max-width:900px){

      .container{
        flex-direction:column;
      }

      .chat-section{
        width:100%;
        height:45vh;
      }

      .pdf-section{
        height:50vh;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- =========================
         PDF SECTION
    ========================== -->

    <div class="pdf-section">

      <div class="pdf-header">
        COURSE
      </div>

      <div class="pdf-viewer">

        <div class="pdf-pages">

          <div class="pdf-container">

            <canvas id="pdf-canvas"></canvas>

            <div id="text-layer" class="textLayer"></div>

          </div>

        </div>

      </div>

      <!-- PDF BUTTONS -->

      <div class="pdf-controls">

        <button onclick="previousPage()">
          ⬅ Previous
        </button>

        <button onclick="nextPage()">
          Next ➡
        </button>

      </div>

    </div>

    <!-- =========================
         CHATBOT SECTION
    ========================== -->

    <div class="chat-section">

      <div class="chat-header">
        RAG Assistant
      </div>

      <div class="chat-box" id="chatBox">

        <div class="message bot">
          Hello 👋 <br>
          Ask questions from your PDF document.
        </div>

      </div>

      <!-- INPUT -->

      <div class="input-area">

        <input
          type="text"
          id="userInput"
          placeholder="Ask something..."
        >

        <button onclick="sendMessage()">
          ➤
        </button>

      </div>

    </div>

  </div>

  <!-- =========================
       PDF.js Library
  ========================== -->

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>

  <script>

    // =========================
    // PDF.js CONFIG
    // =========================

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // =========================
    // PDF FILE
    // =========================

    const url = 'history book.pdf';

    let pdfDoc = null;

    let pageNum = 1;

    const scale = 1.0;

    const canvas = document.getElementById('pdf-canvas');

    const ctx = canvas.getContext('2d');

    // =========================
    // RENDER PDF PAGE
    // =========================

    async function renderPage(num){

      const page = await pdfDoc.getPage(num);

      const viewport = page.getViewport({
        scale: scale
      });

      canvas.height = viewport.height;

      canvas.width = viewport.width;

      const pdfContainer =
      document.querySelector(".pdf-container");

      pdfContainer.style.width =
      viewport.width + "px";

      pdfContainer.style.height =
      viewport.height + "px";

      const renderContext = {

        canvasContext: ctx,

        viewport: viewport

      };

      await page.render(renderContext).promise;

      // =========================
      // TEXT LAYER
      // =========================

      const textLayerDiv =
      document.getElementById("text-layer");

      textLayerDiv.innerHTML = "";

      const textContent =
      await page.getTextContent();

      pdfjsLib.renderTextLayer({

        textContent: textContent,

        container: textLayerDiv,

        viewport: viewport,

        textDivs: []

      });

    }

    // =========================
    // LOAD PDF
    // =========================

    pdfjsLib.getDocument(url).promise

    .then(function(pdf){

      pdfDoc = pdf;

      console.log("PDF Loaded");

      renderPage(pageNum);

    })

    .catch(function(error){

      console.error("PDF Error:", error);

      alert("PDF not loading.");

    });

    // =========================
    // NEXT PAGE
    // =========================

    function nextPage(){

      if(pageNum >= pdfDoc.numPages){

        return;

      }

      pageNum++;

      renderPage(pageNum);

    }

    // =========================
    // PREVIOUS PAGE
    // =========================

    function previousPage(){

      if(pageNum <= 1){

        return;

      }

      pageNum--;

      renderPage(pageNum);

    }

    // =========================
    // ENTER KEY SUPPORT
    // =========================

    const inputField =
    document.getElementById("userInput");

    inputField.addEventListener(
      "keypress",
      function(event){

      if(event.key === "Enter"){

        sendMessage();

      }

    });

    // =========================
    // CHAT FUNCTION
    // =========================

    async function sendMessage(){

      const input =
      document.getElementById("userInput");

      const chatBox =
      document.getElementById("chatBox");

      const question =
      input.value.trim();

      if(question === "") return;

      // USER MESSAGE

      const userMsg =
      document.createElement("div");

      userMsg.className = "message user";

      userMsg.innerText = question;

      chatBox.appendChild(userMsg);

      input.value = "";

      // BOT MESSAGE

      const botMsg =
      document.createElement("div");

      botMsg.className = "message bot";

      botMsg.innerText = "Thinking...";

      chatBox.appendChild(botMsg);

      chatBox.scrollTop =
      chatBox.scrollHeight;

      try{

        const response = await fetch(

          "http://127.0.0.1:5000/chat",

          {
            method:"POST",

            headers:{
              "Content-Type":"application/json"
            },

            body:JSON.stringify({
              question:question
            })

          }

        );

        const data = await response.json();

        botMsg.innerText = data.answer;

      }

      catch(error){

        botMsg.innerText =
        "Backend connection error.";

      }

      chatBox.scrollTop =
      chatBox.scrollHeight;

    }

  </script>

</body>

</html>
